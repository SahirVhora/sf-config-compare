<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}SF Config Compare{% endblock %}</title>
    <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='favicon.svg') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <div class="sidebar-brand">
        <span class="brand-icon">⚖</span>
        <span class="brand-name">SF Config Compare</span>
      </div>
      <nav class="sidebar-nav">
        <a href="{{ url_for('index') }}" class="nav-link {% if request.endpoint == 'index' %}active{% endif %}">
          <span class="nav-icon">🖥</span> Instances
        </a>
        <a href="{{ url_for('compare') }}" class="nav-link {% if request.endpoint == 'compare' %}active{% endif %}">
          <span class="nav-icon">⚖</span> Compare
        </a>
        <a href="{{ url_for('matrix_compare') }}" class="nav-link {% if request.endpoint == 'matrix_compare' %}active{% endif %}">
          <span class="nav-icon">⊞</span> Matrix
        </a>
      </nav>
    </aside>

    <main class="main">
      <div class="flash-container">
        {% for cat, msg in get_flashed_messages(with_categories=true) %}
        <div class="flash flash-{{ cat }}">{{ msg }}</div>
        {% endfor %}
      </div>
      {% block content %}{% endblock %}
    </main>
  </div>
  <script src="{{ url_for('static', filename='app.js') }}"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
